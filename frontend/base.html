<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}CRM{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f7fb;
            --panel: #ffffff;
            --text: #172033;
            --muted: #667085;
            --line: #d9e0ea;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --danger-bg: #fff4f2;
            --danger-text: #b42318;
            --shadow: 0 18px 45px rgba(23, 32, 51, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background:
                linear-gradient(135deg, rgba(37, 99, 235, 0.08), rgba(16, 185, 129, 0.08)),
                var(--bg);
        }

        a {
            color: var(--primary);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .page {
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            min-height: 64px;
            padding: 0 32px;
            border-bottom: 1px solid rgba(217, 224, 234, 0.8);
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(12px);
        }

        .brand {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
        }

        .logout-form {
            margin: 0;
        }

        .nav-button {
            border: 0;
            padding: 0;
            color: var(--primary);
            background: transparent;
            font: inherit;
            cursor: pointer;
        }

        .nav-button:hover {
            text-decoration: underline;
        }

        .main {
            display: grid;
            place-items: center;
            padding: 48px 20px;
        }

        .auth-card {
            width: min(100%, 420px);
            padding: 32px;
            border: 1px solid rgba(217, 224, 234, 0.9);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .auth-header {
            margin-bottom: 28px;
        }

        .auth-title {
            margin: 0 0 8px;
            font-size: 28px;
            line-height: 1.2;
            letter-spacing: 0;
        }

        .auth-subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.5;
        }

        .form {
            display: grid;
            gap: 18px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        .field label {
            font-size: 14px;
            font-weight: 600;
        }

        .field input,
        .field select,
        .field textarea {
            width: 100%;
            min-height: 44px;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--text);
            background: #ffffff;
            font: inherit;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .field textarea {
            min-height: 96px;
            resize: vertical;
        }

        .field select[multiple] {
            min-height: 160px;
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
        }

        .helptext {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.4;
        }

        .errorlist {
            margin: 0;
            padding: 10px 12px;
            border-radius: 6px;
            list-style: none;
            color: var(--danger-text);
            background: var(--danger-bg);
            font-size: 13px;
            line-height: 1.4;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            width: 100%;
            border: 0;
            border-radius: 6px;
            padding: 10px 16px;
            color: #ffffff;
            background: var(--primary);
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.15s ease, transform 0.15s ease;
        }

        .button:hover {
            background: var(--primary-hover);
        }

        .button:active {
            transform: translateY(1px);
        }

        .secondary-action {
            margin-top: 22px;
            color: var(--muted);
            font-size: 14px;
            text-align: center;
        }

        .profile-photo {
            width: 96px;
            height: 96px;
            margin: 0 0 22px;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #f8fafc;
        }

        .profile-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .home-panel {
            width: min(100%, 760px);
        }

        .home-title {
            margin: 0 0 12px;
            font-size: 38px;
            line-height: 1.15;
            letter-spacing: 0;
        }

        .home-text {
            max-width: 560px;
            margin: 0 0 28px;
            color: var(--muted);
            font-size: 17px;
            line-height: 1.6;
        }

        .home-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .home-actions .button {
            width: auto;
            min-width: 136px;
        }

        .button-light {
            color: var(--text);
            background: #ffffff;
            border: 1px solid var(--line);
        }

        .button-light:hover {
            background: #f8fafc;
        }

        .workspace {
            width: min(100%, 980px);
        }

        .workspace-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 24px;
        }

        .workspace-title {
            margin: 0 0 8px;
            font-size: 30px;
            line-height: 1.2;
            letter-spacing: 0;
        }

        .workspace-subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.5;
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
        }

        .table {
            width: 100%;
            min-width: 720px;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
            font-size: 14px;
        }

        .table th {
            color: var(--muted);
            background: #f8fafc;
            font-weight: 700;
        }

        .table tr:last-child td {
            border-bottom: 0;
        }

        .row-actions {
            display: flex;
            gap: 12px;
            white-space: nowrap;
        }

        .status {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            border-radius: 999px;
            padding: 2px 10px;
            font-size: 13px;
            font-weight: 700;
        }

        .status-active {
            color: #067647;
            background: #ecfdf3;
        }

        .status-muted {
            color: #475467;
            background: #f2f4f7;
        }

        .empty-state {
            padding: 32px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
            color: var(--muted);
            text-align: center;
        }

        .danger-button {
            background: #dc2626;
        }

        .danger-button:hover {
            background: #b91c1c;
        }

        @media (max-width: 560px) {
            .topbar {
                padding: 0 18px;
            }

            .nav {
                gap: 10px;
            }

            .main {
                padding: 32px 16px;
                align-items: start;
            }

            .auth-card {
                padding: 24px;
            }

            .auth-title {
                font-size: 24px;
            }

            .home-title {
                font-size: 30px;
            }

            .workspace-header {
                display: grid;
            }

            .workspace-header .button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="topbar">
            <a class="brand" href="{% url 'home' %}">CRM</a>
            <nav class="nav" aria-label="Основная навигация">
                {% if user.is_authenticated %}
                    <span>{{ user.username }}</span>
                    <a href="{% url 'job_title_list' %}">Должности</a>
                    <form class="logout-form" action="{% url 'logout' %}" method="post">
                        {% csrf_token %}
                        <button class="nav-button" type="submit">Выйти</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Войти</a>
                    <a href="{% url 'signup' %}">Регистрация</a>
                {% endif %}
            </nav>
        </header>

        <main class="main">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
